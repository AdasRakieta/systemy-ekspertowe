<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Ekspercki - Rekomendacja Książek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 System Ekspercki Rekomendacji Książek</h1>
            <p class="subtitle">Znajdź idealną książkę dopasowaną do Twoich preferencji</p>
        </header>

        <main>
            <div class="form-container">
                <form id="preferencesForm">
                    <div class="form-grid">
                        <!-- Gatunek -->
                        <div class="form-group">
                            <label for="gatunek">📖 Gatunek</label>
                            <select id="gatunek" name="gatunek">
                                <option value="">-- Wybierz gatunek --</option>
                            </select>
                        </div>

                        <!-- Klimat -->
                        <div class="form-group">
                            <label for="klimat">🌙 Klimat</label>
                            <select id="klimat" name="klimat">
                                <option value="">-- Wybierz klimat --</option>
                            </select>
                        </div>

                        <!-- Długość -->
                        <div class="form-group">
                            <label for="dlugosc">📏 Długość</label>
                            <select id="dlugosc" name="dlugosc">
                                <option value="">-- Wybierz długość --</option>
                            </select>
                        </div>

                        <!-- Tempo -->
                        <div class="form-group">
                            <label for="tempo">⚡ Tempo</label>
                            <select id="tempo" name="tempo">
                                <option value="">-- Wybierz tempo --</option>
                            </select>
                        </div>

                        <!-- Wiek bohatera -->
                        <div class="form-group">
                            <label for="wiek_bohatera">👤 Wiek bohatera</label>
                            <select id="wiek_bohatera" name="wiek_bohatera">
                                <option value="">-- Wybierz wiek --</option>
                            </select>
                        </div>

                        <!-- Świat -->
                        <div class="form-group">
                            <label for="swiat">🌍 Świat</label>
                            <select id="swiat" name="swiat">
                                <option value="">-- Wybierz świat --</option>
                            </select>
                        </div>

                        <!-- Miejsce -->
                        <div class="form-group">
                            <label for="miejsce">📍 Miejsce akcji</label>
                            <select id="miejsce" name="miejsce">
                                <option value="">-- Wybierz miejsce --</option>
                            </select>
                        </div>

                        <!-- Pochodzenie -->
                        <div class="form-group">
                            <label for="pochodzenie">🗺️ Pochodzenie</label>
                            <select id="pochodzenie" name="pochodzenie">
                                <option value="">-- Wybierz pochodzenie --</option>
                            </select>
                        </div>

                        <!-- Epoka -->
                        <div class="form-group">
                            <label for="epoka">⏳ Epoka</label>
                            <select id="epoka" name="epoka">
                                <option value="">-- Wybierz epokę --</option>
                            </select>
                        </div>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn btn-primary">
                            🔍 Znajdź książkę
                        </button>
                        <button type="reset" class="btn btn-secondary">
                            🔄 Wyczyść
                        </button>
                    </div>
                </form>
            </div>

            <div id="results" class="results-container" style="display: none;">
                <h2>🏆 Twoje Rekomendacje</h2>
                <div id="top3" class="top3-container"></div>
                <div id="explanations" class="explanations-container"></div>
            </div>

            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Szukam idealnej książki dla Ciebie...</p>
            </div>

            <div id="error" class="error-message" style="display: none;"></div>
        </main>

        <footer>
            <p>💡 Wypełnij formularz, aby otrzymać spersonalizowane rekomendacje książek</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
